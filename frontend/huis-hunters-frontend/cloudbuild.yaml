steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'REACT_APP_SEARCH_API_URL=${_REACT_APP_SEARCH_API_URL}'
      - '--build-arg'
      - 'REACT_APP_GOOGLE_MAPS_API_KEY=${_REACT_APP_GOOGLE_MAPS_API_KEY}'
      - '--tag'
      - '${_IMAGE_NAME}'
      - '.'
images:
  - '${_IMAGE_NAME}'
options:
  machineType: 'N1_HIGHCPU_8'

