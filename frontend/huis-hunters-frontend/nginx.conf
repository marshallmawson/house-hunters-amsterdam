# Map to detect social media crawlers
map $http_user_agent $is_crawler {
    default 0;
    ~*(WhatsApp|facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|SkypeUriPreview|Applebot|Googlebot|bingbot|Yahoo|DuckDuckBot|Baiduspider|YandexBot|Sogou|Exabot|ia_archiver) 1;
}

# Resolver for DNS resolution when using variables in proxy_pass
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Cache static assets with content hashes for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    # Cache HTML files for 15 minutes - good performance with reasonable update time
    location ~* \.html$ {
        expires 15m;
        add_header Cache-Control "public, max-age=900, must-revalidate";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }
    
    # Proxy listing URLs to Flask API for crawlers only
    location ~ ^/listings/(.+)$ {
        # Set proxy target variable - only set if crawler
        set $proxy_target "";
        if ($is_crawler = 1) {
            set $proxy_target "https://search-service-315949479081.europe-west4.run.app$request_uri";
        }
        
        # If crawler, proxy to Flask API
        if ($proxy_target != "") {
            proxy_pass $proxy_target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_redirect off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            break;
        }
        
        # For regular users, serve React app
        try_files $uri $uri/ /index.html;
        expires 15m;
        add_header Cache-Control "public, max-age=900, must-revalidate";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    # Handle React Router - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
        expires 15m;
        add_header Cache-Control "public, max-age=900, must-revalidate";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}
